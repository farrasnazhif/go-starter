basePath: /api/v1
definitions:
  github_com_farrasnazhif_go-starter_internal_dto_request.CancelSubscription:
    properties:
      reason:
        type: string
    type: object
  github_com_farrasnazhif_go-starter_internal_dto_request.Login:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_farrasnazhif_go-starter_internal_dto_request.Register:
    properties:
      email:
        maxLength: 225
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
      username:
        maxLength: 100
        type: string
    required:
    - email
    - password
    - username
    type: object
  github_com_farrasnazhif_go-starter_internal_dto_request.SendOTP:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  github_com_farrasnazhif_go-starter_internal_dto_request.VerifyOTP:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  github_com_farrasnazhif_go-starter_internal_dto_response.Subscription:
    properties:
      approve_url:
        type: string
      status:
        type: string
      subscription_id:
        type: string
    type: object
  github_com_farrasnazhif_go-starter_internal_dto_response.User:
    properties:
      credits:
        type: integer
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      role:
        type: string
      username:
        type: string
    type: object
  github_com_farrasnazhif_go-starter_internal_dto_response.UserBilling:
    properties:
      created_at:
        type: string
      email:
        type: string
      expired_at:
        type: string
      role:
        type: string
      subscription_status:
        type: string
      userId:
        type: string
      username:
        type: string
    type: object
  github_com_farrasnazhif_go-starter_internal_dto_response.UserWithToken:
    properties:
      credits:
        type: integer
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      role:
        type: string
      token:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: User authentication, profile management, and PayPal billing API
  title: Go Starter API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password, returns JWT token
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_request.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_response.UserWithToken'
        "400":
          description: Bad Request
      summary: Login user
      tags:
      - auth
  /auth/otp/send:
    post:
      consumes:
      - application/json
      description: Send OTP code to email for verification
      parameters:
      - description: Email payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_request.SendOTP'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
      summary: Send OTP for registration
      tags:
      - auth
  /auth/otp/verify:
    post:
      consumes:
      - application/json
      description: Verify OTP code and activate user account, returns JWT token
      parameters:
      - description: OTP verification payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_request.VerifyOTP'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_response.UserWithToken'
        "400":
          description: Bad Request
      summary: Verify OTP and activate account
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a user account and send OTP for verification
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_request.Register'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
      summary: Register a new user
      tags:
      - auth
  /billing/paypal/subscriptions:
    delete:
      consumes:
      - application/json
      description: Cancel the current Pro subscription
      parameters:
      - description: Cancellation reason
        in: body
        name: body
        schema:
          $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_request.CancelSubscription'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Cancel PayPal subscription
      tags:
      - billing
    post:
      description: Create a new Pro subscription via PayPal
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_response.Subscription'
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create PayPal subscription
      tags:
      - billing
  /billing/paypal/webhook:
    post:
      consumes:
      - application/json
      description: Handle PayPal subscription webhook events
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
      summary: PayPal webhook
      tags:
      - billing
  /users/billing:
    get:
      description: Get the authenticated user's billing and subscription info
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_response.UserBilling'
        "401":
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: Get user billing info
      tags:
      - users
  /users/me:
    get:
      description: Get the authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_farrasnazhif_go-starter_internal_dto_response.User'
        "401":
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - users
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Bearer token (e.g. "Bearer xxx")
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
